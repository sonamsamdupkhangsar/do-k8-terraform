apiVersion: v1
kind: Secret
metadata:
  name: digitalocean-dns-token
  namespace: {{ .Values.cert_manager_namespace }} # Replace this with the namespace where cert-manager is installed
  labels:
    app: cert-manager
    chart: cert-manager
    release: cert-manager
    heritage: Helm
    managed-by: cluster-issuer
    environment: production
    terraform: "true"
type: Opaque
stringData:
  access-token: {{ .Values.digitalocean_api_token | quote }}
